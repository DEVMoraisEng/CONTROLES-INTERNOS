name: Atualizar dados e publicar site

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar data.json
        env:
          NOTION_TOKEN_DOCS:   ${{ secrets.NOTION_TOKEN_DOCS }}
          NOTION_DB_DOCS:      ${{ secrets.NOTION_DB_DOCS }}
          NOTION_TOKEN_VENDAS: ${{ secrets.NOTION_TOKEN_VENDAS }}
          NOTION_DB_VENDAS:    ${{ secrets.NOTION_DB_VENDAS }}
          ERP_USERNAME:        ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD:        ${{ secrets.ERP_PASSWORD }}
        run: python fetch_all.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: atualizar data.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push

      - name: Preparar pasta de publicação
        run: |
          mkdir -p dist
          cp terrabela.html dist/
          cp terrabela.html dist/index.html
          cp data.json dist/
          cp TERRABELA_MAPA_DOCUMENTOS.svg dist/
          cp TERRABELA_MAPA_VENDAS.svg dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
